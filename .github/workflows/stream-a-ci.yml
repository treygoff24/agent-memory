name: stream-a-ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TEST_FIXTURE_FEATURES: memoryd-web/dev-fixtures,memoryd/dev-fixtures
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git author for temporary substrate commits
        run: |
          git config --global user.name "Memorum CI"
          git config --global user.email "ci@memorum.local"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --features "$TEST_FIXTURE_FEATURES"
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: ./scripts/rust-boundary-check.sh
      - run: ./scripts/two-clone-convergence.sh --smoke
      - run: ./scripts/bench-gate.sh --tier smoke --profile linux-x86_64 --output bench/results.linux-x86_64.smoke.json

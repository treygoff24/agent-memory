name: Stream H Eval Harness

on:
  push:
    branches: ["main"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      harness_mode:
        description: "Harness mode: mock, claude, codex, all"
        type: choice
        default: "mock"
        options:
          - mock
          - claude
          - codex
          - all

jobs:
  eval-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git author for temporary substrate commits
        run: |
          git config --global user.name "Memorum CI"
          git config --global user.email "ci@memorum.local"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build memorum-eval
        run: cargo build --release -p memorum-eval

      - name: Enforce regression metadata contract
        run: cargo test -p memorum-eval --test regression_meta -- --nocapture

      - name: Quality metrics gate (golden corpus — no LLM, mock-mode)
        run: |
          # Recall quality metrics (precision/recall@K, MRR, nDCG, trap-rate@5)
          # over the golden corpus, replayed through the real ranking seams. The
          # gate test compares against the human-committed
          # bench/quality-baseline.json and SKIPS cleanly until that file exists.
          cargo test -p memorum-eval --test quality_baseline -- --nocapture
          # Emit the report artifact for trend review (and for establishing the
          # baseline on first run). Never overwrites bench/quality-baseline.json.
          cargo run --release -p memorum-eval --bin memorum-eval-quality -- \
            --output-file quality-results.json --check
        env:
          RUST_LOG: warn

      - name: Run eval harness (mock harness — always runs)
        run: |
          cargo run --release -p memorum-eval -- \
            --harness mock \
            --required-release-set alpha \
            --output json \
            --output-file eval-results-mock.json
        env:
          RUST_LOG: warn

      - name: Run eval harness (real harnesses — when auth secrets present)
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && inputs.harness_mode != 'mock')
        run: |
          HARNESS_MODE="${{ github.event_name == 'workflow_dispatch' && inputs.harness_mode || 'all' }}"
          cargo run --release -p memorum-eval -- \
            --harness "$HARNESS_MODE" \
            --required-release-set alpha \
            --output json \
            --output-file eval-results-full.json
        env:
          MEMORUM_EVAL_CLAUDE_KEY: ${{ secrets.MEMORUM_EVAL_CLAUDE_KEY }}
          MEMORUM_EVAL_CODEX_KEY: ${{ secrets.MEMORUM_EVAL_CODEX_KEY }}
          RUST_LOG: warn

      - name: Skip real harnesses on non-release push
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Normal push runs the cheap mock/simulator alpha release set only."
          echo "Real-harness semantic coverage runs on RC tags or explicit workflow_dispatch."

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: |
            eval-results-*.json
            quality-results.json

      - name: Fail if eval did not pass
        run: |
          RESULT_FILE=eval-results-full.json
          [ -f "$RESULT_FILE" ] || RESULT_FILE=eval-results-mock.json
          FAILED=$(jq -r '.failed' "$RESULT_FILE")
          if [ "$FAILED" != "0" ]; then
            echo "Eval harness failed: $FAILED test(s) reported failure"
            jq -r '.tests[] | select(.status == "failed") | "  - #\(.number) \(.name): \(.failure_detail // \"no detail\")"' "$RESULT_FILE"
            exit 1
          fi

          RELEASE_BLOCKERS=$(jq -r '.release_blockers // [] | length' "$RESULT_FILE")
          if [ "$RELEASE_BLOCKERS" != "0" ]; then
            echo "Required release set has $RELEASE_BLOCKERS blocker(s):"
            jq -r '.release_blockers[] | "  - \(.)"' "$RESULT_FILE"
            exit 1
          fi

          PARTIAL=$(jq -r '.partial // false' "$RESULT_FILE")
          HARNESS_MODE=$(jq -r '.harness_mode' "$RESULT_FILE")
          if [ "$PARTIAL" = "true" ] && [ "$HARNESS_MODE" != "mock" ]; then
            MISSING=$(jq -r '.missing_credentials // [] | join(", ")' "$RESULT_FILE")
            echo "Non-mock eval run is partial — missing credentials: $MISSING"
            exit 1
          fi

          if [ "$HARNESS_MODE" = "mock" ]; then
            MOCK_PASSES=$(jq -r '[.tests[] | select(.status == "passed" and .mode == "real_harness" and (.number == 13 or .number == 15))] | length' "$RESULT_FILE")
            if [ "$MOCK_PASSES" != "0" ]; then
              echo "Mock harness reported semantic real-harness tests as passed; these must be skipped."
              jq -r '.tests[] | select(.status == "passed" and .mode == "real_harness" and (.number == 13 or .number == 15)) | "  - #\(.number) \(.name)"' "$RESULT_FILE"
              exit 1
            fi
          fi

      - name: Fail if RC run is partial
        if: startsWith(github.ref, 'refs/tags/v1.') && contains(github.ref, '-rc.')
        run: |
          RESULT_FILE=eval-results-full.json
          [ -f "$RESULT_FILE" ] || RESULT_FILE=eval-results-mock.json
          PARTIAL=$(jq -r '.partial // false' "$RESULT_FILE")
          if [ "$PARTIAL" = "true" ]; then
            MISSING=$(jq -r '.missing_credentials // [] | join(", ")' "$RESULT_FILE")
            echo "RC eval run is partial — missing credentials: $MISSING"
            echo "RC gates require a full eval (set MEMORUM_EVAL_CLAUDE_KEY and MEMORUM_EVAL_CODEX_KEY)."
            exit 1
          fi
